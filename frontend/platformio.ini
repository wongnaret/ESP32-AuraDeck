; PlatformIO Project Configuration File for ESP32-S3 AuraDeck
; Board: Waveshare ESP32-S3-RLCD-4.2 (ESP32-S3-WROOM-1-N16R8)
; Flash: 16MB (Quad SPI), PSRAM: 8MB (Octal SPI)

[env:esp32s3_auradeck]
platform = espressif32@^6.5.0
board = esp32s3box
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; Configure 16MB Flash
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv

build_flags =
    -DBOARD_HAS_PSRAM
    ; USB CDC Settings for serial monitoring on Type-C port
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; LVGL Configuration File Pointer
    -DLV_CONF_INCLUDE_SIMPLE
    -Isrc/

monitor_filters = esp32_exception_decoder
build_type = debug

lib_deps =
    lvgl/lvgl@~8.3.11
    bblanchon/ArduinoJson@^6.21.3
    knolleary/PubSubClient@^2
    adafruit/Adafruit SHTC3 Library@^1.0.1
    adafruit/RTClib@^2.1.4
    adafruit/Adafruit BusIO@^1.14.5
    Wire
    SPI
