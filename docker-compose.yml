version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: auradeck_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auradeck_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
    env_file:
      - ./backend/.env
    restart: unless-stopped
    depends_on:
      - mosquitto
